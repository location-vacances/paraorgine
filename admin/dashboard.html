<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Parapharmacie Origine</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap"
    rel="stylesheet">
  <link rel="shortcut icon" href="../assets/imgs/logo.png" type="image/x-icon">
  <link rel="stylesheet" href="./assets/css/style.css">
</head>

<body>

  <!-- TOPBAR -->
  <nav class="topbar">
    <div class="topbar-brand">
      <div class="topbar-logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round">
          <path d="M12 2L2 7l10 5 10-5-10-5z" />
          <path d="M2 17l10 5 10-5" />
          <path d="M2 12l10 5 10-5" />
        </svg>
      </div>
      <span class="topbar-title">Parapharmacie <span>Origine</span></span>
    </div>
    <div class="topbar-actions">
      <button class="btn btn-ghost btn-sm" id="syncBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round">
          <polyline points="1 4 1 10 7 10" />
          <polyline points="23 20 23 14 17 14" />
          <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15" />
        </svg>
        Synchroniser
      </button>
      <button class="btn btn-ghost btn-sm" id="logoutBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
          <polyline points="16 17 21 12 16 7" />
          <line x1="21" y1="12" x2="9" y2="12" />
        </svg>
        Déconnexion
      </button>
    </div>
  </nav>

  <!-- LAYOUT -->
  <div class="layout">
    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-label">Navigation</div>
      <a class="nav-link active" data-section="products">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round">
          <rect x="2" y="3" width="20" height="14" rx="2" />
          <line x1="8" y1="21" x2="16" y2="21" />
          <line x1="12" y1="17" x2="12" y2="21" />
        </svg>
        Produits
        <span class="nav-badge" id="products-count">0</span>
      </a>
      <a class="nav-link" data-section="orders">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round">
          <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z" />
          <line x1="3" y1="6" x2="21" y2="6" />
          <path d="M16 10a4 4 0 0 1-8 0" />
        </svg>
        Commandes
        <span class="nav-badge" id="orders-count">0</span>
      </a>
    </aside>

    <!-- MAIN -->
    <main class="main">

      <!-- PRODUCTS SECTION -->
      <div id="products-section" class="section active">
        <div class="page-header">
          <div>
            <h2>Produits</h2>
            <p id="products-subtitle">Chargement...</p>
          </div>
          <button class="btn btn-primary" id="addProductBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round">
              <line x1="12" y1="5" x2="12" y2="19" />
              <line x1="5" y1="12" x2="19" y2="12" />
            </svg>
            Ajouter un produit
          </button>
        </div>
        <div class="search-bar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          <input type="text" id="product-search" placeholder="Rechercher un produit...">
        </div>
        <div id="products-list">
          <div class="loading-row">
            <div class="skeleton"></div>
            <div class="skeleton"></div>
            <div class="skeleton"></div>
          </div>
        </div>
      </div>

      <!-- ORDERS SECTION -->
      <div id="orders-section" class="section">
        <div class="page-header">
          <div>
            <h2>Commandes</h2>
            <p id="orders-subtitle">Chargement...</p>
          </div>
        </div>
        <div class="search-bar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          <input type="text" id="order-search" placeholder="Rechercher une commande...">
        </div>
        <div id="orders-list">
          <div class="loading-row">
            <div class="skeleton"></div>
            <div class="skeleton"></div>
          </div>
        </div>
      </div>

    </main>
  </div>

  <!-- ORDER DETAIL DRAWER -->
  <div class="drawer-overlay" id="drawerOverlay"></div>
  <div class="drawer" id="orderDrawer">
    <div class="drawer-header">
      <span class="drawer-title" id="drawerTitle">Commande</span>
      <button class="drawer-close" id="drawerClose">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round" width="16" height="16">
          <line x1="18" y1="6" x2="6" y2="18" />
          <line x1="6" y1="6" x2="18" y2="18" />
        </svg>
      </button>
    </div>
    <div id="drawerContent"></div>
  </div>

  <!-- PRODUCT MODAL -->
  <div class="modal-overlay" id="productModal">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title" id="modalTitle">Ajouter un produit</span>
        <button class="drawer-close" id="closeModal">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round" width="16" height="16">
            <line x1="18" y1="6" x2="6" y2="18" />
            <line x1="6" y1="6" x2="18" y2="18" />
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <form id="productForm">
          <input type="hidden" id="productId" name="id">
          <div class="form-grid">
            <div class="form-group full">
              <label>Titre du produit</label>
              <input type="text" id="title" name="title" required placeholder="Ex: Crème hydratante SPF 50">
            </div>
            <div class="form-group">
              <label>Catégorie</label>
              <select id="cat" name="cat" required>
                <option value="peau">Soins de la peau</option>
                <option value="hygiene">Hygiène</option>
                <option value="complements">Compléments</option>
                <option value="maternite">Maternité</option>
                <option value="bienetre">Bien-être</option>
                <option value="solaire">Solaire</option>
              </select>
            </div>
            <div class="form-group">
              <label>Badge (optionnel)</label>
              <input type="text" id="badge" name="badge" placeholder="Ex: Nouveau, Promo">
            </div>
            <div class="form-group">
              <label>Prix (€)</label>
              <input type="number" id="price" name="price" step="0.01" required placeholder="0.00">
            </div>
            <div class="form-group">
              <label>Ancien prix (€)</label>
              <input type="number" id="oldPrice" name="oldPrice" step="0.01" placeholder="0.00">
            </div>
            <div class="form-group">
              <label>Note (étoiles)</label>
              <input type="number" id="stars" name="stars" min="1" max="5" required placeholder="1–5">
            </div>
            <div class="form-group full">
              <label>Image produit</label>
              <input type="file" id="imageFile" name="imageFile" accept="image/*">
              <input type="text" id="image" name="image" placeholder="Ou coller un URL d'image" style="margin-top:8px">
              <span class="form-hint">Choisissez un fichier ou entrez un URL</span>
            </div>
            <div class="form-group full">
              <label>Description</label>
              <textarea id="desc" name="desc" rows="3" required placeholder="Description du produit..."></textarea>
            </div>
            <div class="form-group full">
              <label>Caractéristiques</label>
              <textarea id="features" name="features" rows="4"
                placeholder="Une caractéristique par ligne&#10;Ex: Hydratant 24h&#10;Sans paraben"></textarea>
            </div>
          </div>
          <div class="divider" style="margin-top:20px"></div>
          <div class="modal-footer">
            <button type="button" class="btn btn-ghost" id="cancelBtn">Annuler</button>
            <button type="submit" class="btn btn-primary">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round" width="15" height="15">
                <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z" />
                <polyline points="17 21 17 13 7 13 7 21" />
                <polyline points="7 3 7 8 15 8" />
              </svg>
              Sauvegarder
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- CONFIRM DIALOG -->
  <div class="confirm-overlay" id="confirmOverlay">
    <div class="confirm-box">
      <div class="confirm-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6" />
          <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6" />
          <path d="M10 11v6" />
          <path d="M14 11v6" />
          <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2" />
        </svg>
      </div>
      <p class="confirm-title">Supprimer le produit ?</p>
      <p class="confirm-text" id="confirmText">Cette action est irréversible. Le produit sera définitivement supprimé.
      </p>
      <div class="confirm-actions">
        <button class="btn btn-ghost" id="confirmCancel">Annuler</button>
        <button class="btn btn-danger" id="confirmOk">Supprimer</button>
      </div>
    </div>
  </div>

  <!-- TOAST CONTAINER -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="./assets/js/dashboard.js"></script>
</body>

</html>
