<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Parapharmacie Origine</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap"
    rel="stylesheet">
  <link rel="shortcut icon" href="../assets/imgs/logo.png" type="image/x-icon">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #f5f3ef;
      --surface: #ffffff;
      --surface-2: #f0ede8;
      --border: #e2ddd6;
      --text: #1a1714;
      --text-2: #6b6560;
      --text-3: #9c9590;
      --accent: #2d6a4f;
      --accent-light: #d8f3e6;
      --accent-hover: #235c43;
      --danger: #c0392b;
      --danger-light: #fdecea;
      --warn: #b7791f;
      --warn-light: #fef3cd;
      --info: #2d5986;
      --info-light: #dbeafe;
      --shadow-sm: 0 1px 3px rgba(26, 23, 20, 0.08);
      --shadow: 0 4px 16px rgba(26, 23, 20, 0.10);
      --shadow-lg: 0 12px 40px rgba(26, 23, 20, 0.14);
      --radius: 12px;
      --radius-sm: 8px;
      --sidebar: 240px;
      --topbar: 64px;
      --transition: 0.18s cubic-bezier(0.4, 0, 0.2, 1);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 14px;
      line-height: 1.6;
    }

    /* ── TOPBAR ── */
    .topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      height: var(--topbar);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      box-shadow: var(--shadow-sm);
    }

    .topbar-brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .topbar-logo {
      width: 32px;
      height: 32px;
      background: var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .topbar-logo svg {
      width: 18px;
      height: 18px;
      color: white;
    }

    .topbar-title {
      font-family: 'DM Serif Display', serif;
      font-size: 17px;
      color: var(--text);
      letter-spacing: -0.3px;
    }

    .topbar-title span {
      color: var(--accent);
    }

    .topbar-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 8px 16px;
      border-radius: var(--radius-sm);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      border: none;
      cursor: pointer;
      transition: all var(--transition);
      white-space: nowrap;
    }

    .btn svg {
      width: 15px;
      height: 15px;
      flex-shrink: 0;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
    }

    .btn-primary:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(45, 106, 79, 0.3);
    }

    .btn-secondary {
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      background: var(--border);
    }

    .btn-ghost {
      background: transparent;
      color: var(--text-2);
      border: 1px solid var(--border);
    }

    .btn-ghost:hover {
      background: var(--surface-2);
      color: var(--text);
    }

    .btn-danger {
      background: var(--danger);
      color: white;
    }

    .btn-danger:hover {
      background: #a93226;
      transform: translateY(-1px);
    }

    .btn-sm {
      padding: 5px 10px;
      font-size: 12px;
    }

    .btn-icon {
      padding: 8px;
      width: 36px;
      height: 36px;
      justify-content: center;
    }

    /* ── LAYOUT ── */
    .layout {
      display: flex;
      padding-top: var(--topbar);
      min-height: 100vh;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: var(--sidebar);
      position: fixed;
      top: var(--topbar);
      bottom: 0;
      left: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 20px 12px;
      overflow-y: auto;
    }

    .sidebar-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-3);
      padding: 0 8px;
      margin: 16px 0 6px;
    }

    .sidebar-label:first-child {
      margin-top: 0;
    }

    .nav-link {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 10px;
      border-radius: var(--radius-sm);
      color: var(--text-2);
      text-decoration: none;
      font-size: 13.5px;
      font-weight: 500;
      transition: all var(--transition);
      cursor: pointer;
    }

    .nav-link svg {
      width: 16px;
      height: 16px;
      opacity: 0.7;
    }

    .nav-link:hover {
      background: var(--surface-2);
      color: var(--text);
    }

    .nav-link:hover svg {
      opacity: 1;
    }

    .nav-link.active {
      background: var(--accent-light);
      color: var(--accent);
    }

    .nav-link.active svg {
      opacity: 1;
    }

    .nav-badge {
      margin-left: auto;
      background: var(--accent);
      color: white;
      font-size: 10px;
      font-weight: 700;
      padding: 1px 6px;
      border-radius: 20px;
      min-width: 18px;
      text-align: center;
    }

    /* ── MAIN ── */
    .main {
      flex: 1;
      margin-left: var(--sidebar);
      padding: 28px 32px;
    }

    .section {
      display: none;
    }

    .section.active {
      display: block;
    }

    /* ── PAGE HEADER ── */
    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .page-header h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 26px;
      font-weight: 400;
      color: var(--text);
      letter-spacing: -0.5px;
    }

    .page-header p {
      font-size: 13px;
      color: var(--text-2);
      margin-top: 2px;
    }

    /* ── STATS STRIP ── */
    .stats-strip {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 28px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
      box-shadow: var(--shadow-sm);
    }

    .stat-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--text-3);
    }

    .stat-value {
      font-family: 'DM Serif Display', serif;
      font-size: 30px;
      letter-spacing: -1px;
      color: var(--text);
      margin-top: 4px;
    }

    .stat-sub {
      font-size: 12px;
      color: var(--text-2);
      margin-top: 2px;
    }

    /* ── PRODUCT GRID ── */
    #products-list {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .product-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      box-shadow: var(--shadow-sm);
      transition: box-shadow var(--transition), transform var(--transition);
    }

    .product-card:hover {
      box-shadow: var(--shadow);
      transform: translateY(-1px);
    }

    .product-img {
      width: 64px;
      height: 64px;
      border-radius: var(--radius-sm);
      object-fit: cover;
      background: var(--surface-2);
      flex-shrink: 0;
      border: 1px solid var(--border);
    }

    .product-img-placeholder {
      width: 64px;
      height: 64px;
      border-radius: var(--radius-sm);
      background: var(--surface-2);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
    }

    .product-img-placeholder svg {
      width: 24px;
      height: 24px;
      color: var(--text-3);
    }

    .product-info {
      flex: 1;
      min-width: 0;
    }

    .product-title {
      font-weight: 600;
      font-size: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .product-meta {
      font-size: 12px;
      color: var(--text-2);
      margin-top: 3px;
    }

    .product-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      background: var(--accent-light);
      color: var(--accent);
      margin-left: 6px;
    }

    .product-price {
      font-family: 'DM Serif Display', serif;
      font-size: 18px;
      color: var(--text);
      white-space: nowrap;
    }

    .product-old-price {
      font-size: 12px;
      color: var(--text-3);
      text-decoration: line-through;
      margin-left: 4px;
    }

    .product-actions {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    .stars {
      color: #e6a817;
      font-size: 12px;
    }

    /* ── ORDERS ── */
    #orders-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .order-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 22px;
      box-shadow: var(--shadow-sm);
      transition: box-shadow var(--transition);
    }

    .order-card:hover {
      box-shadow: var(--shadow);
    }

    .order-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
    }

    .order-id {
      font-family: 'DM Serif Display', serif;
      font-size: 16px;
      letter-spacing: -0.3px;
    }

    .order-id span {
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      color: var(--text-3);
      font-weight: 400;
    }

    .order-meta {
      font-size: 13px;
      color: var(--text-2);
      margin-top: 4px;
    }

    .order-meta strong {
      color: var(--text);
      font-weight: 600;
    }

    .order-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-shrink: 0;
    }

    .order-footer {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.3px;
    }

    .status-pill::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
    }

    .status-pending {
      background: var(--warn-light);
      color: var(--warn);
    }

    .status-completed {
      background: var(--accent-light);
      color: var(--accent);
    }

    .order-total {
      font-weight: 700;
      font-size: 14px;
      margin-left: auto;
    }

    .order-date {
      font-size: 12px;
      color: var(--text-3);
    }

    /* ── ORDER DETAIL DRAWER ── */
    .drawer-overlay {
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(26, 23, 20, 0.4);
      backdrop-filter: blur(2px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.22s ease;
    }

    .drawer-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .drawer {
      position: fixed;
      top: 0;
      right: 0;
      bottom: 0;
      width: 420px;
      max-width: 95vw;
      background: var(--surface);
      box-shadow: var(--shadow-lg);
      transform: translateX(100%);
      transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 201;
      overflow-y: auto;
      padding: 28px;
    }

    .drawer.open {
      transform: translateX(0);
    }

    .drawer-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .drawer-title {
      font-family: 'DM Serif Display', serif;
      font-size: 22px;
    }

    .drawer-close {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface-2);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all var(--transition);
      color: var(--text-2);
    }

    .drawer-close:hover {
      background: var(--border);
      color: var(--text);
    }

    .drawer-section {
      margin-bottom: 22px;
    }

    .drawer-section-title {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-3);
      margin-bottom: 10px;
    }

    .drawer-info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .drawer-field {
      padding: 10px 12px;
      background: var(--surface-2);
      border-radius: var(--radius-sm);
    }

    .drawer-field label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--text-3);
      display: block;
      margin-bottom: 2px;
    }

    .drawer-field span {
      font-size: 13px;
      color: var(--text);
      font-weight: 500;
    }

    .drawer-field.full {
      grid-column: 1/-1;
    }

    .drawer-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }

    .drawer-item:last-child {
      border: none;
    }

    .drawer-item-img {
      width: 44px;
      height: 44px;
      border-radius: 8px;
      object-fit: cover;
      background: var(--surface-2);
      border: 1px solid var(--border);
      flex-shrink: 0;
    }

    .drawer-item-name {
      flex: 1;
      font-size: 13px;
      font-weight: 500;
    }

    .drawer-item-qty {
      font-size: 12px;
      color: var(--text-2);
    }

    .drawer-item-price {
      font-weight: 700;
      font-size: 13px;
    }

    .drawer-totals {
      background: var(--surface-2);
      border-radius: var(--radius-sm);
      padding: 14px 16px;
    }

    .drawer-total-row {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      padding: 3px 0;
    }

    .drawer-total-row.final {
      font-weight: 700;
      font-size: 15px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
      margin-top: 6px;
    }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 300;
      background: rgba(26, 23, 20, 0.5);
      backdrop-filter: blur(3px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.22s ease;
    }

    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      background: var(--surface);
      border-radius: 16px;
      width: 100%;
      max-width: 620px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: var(--shadow-lg);
      transform: scale(0.96) translateY(10px);
      transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .modal-overlay.open .modal {
      transform: scale(1) translateY(0);
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 22px 26px 0;
    }

    .modal-title {
      font-family: 'DM Serif Display', serif;
      font-size: 22px;
    }

    .modal-body {
      padding: 20px 26px 26px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .form-group.full {
      grid-column: 1/-1;
    }

    .form-group label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-2);
      letter-spacing: 0.3px;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      padding: 9px 12px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: 'DM Sans', sans-serif;
      font-size: 13.5px;
      color: var(--text);
      background: var(--surface);
      transition: border-color var(--transition);
      outline: none;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      border-color: var(--accent);
    }

    .form-group input[type="file"] {
      padding: 7px 10px;
      background: var(--surface-2);
      border-style: dashed;
    }

    .form-hint {
      font-size: 11px;
      color: var(--text-3);
      margin-top: 2px;
    }

    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      margin-top: 4px;
    }

    /* ── CONFIRM DIALOG ── */
    .confirm-overlay {
      position: fixed;
      inset: 0;
      z-index: 400;
      background: rgba(26, 23, 20, 0.55);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.18s ease;
    }

    .confirm-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .confirm-box {
      background: var(--surface);
      border-radius: 16px;
      padding: 28px 28px 22px;
      width: 100%;
      max-width: 380px;
      box-shadow: var(--shadow-lg);
      text-align: center;
      transform: scale(0.94);
      transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .confirm-overlay.open .confirm-box {
      transform: scale(1);
    }

    .confirm-icon {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: var(--danger-light);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
    }

    .confirm-icon svg {
      width: 26px;
      height: 26px;
      color: var(--danger);
    }

    .confirm-title {
      font-family: 'DM Serif Display', serif;
      font-size: 20px;
      margin-bottom: 8px;
    }

    .confirm-text {
      font-size: 13.5px;
      color: var(--text-2);
      line-height: 1.55;
    }

    .confirm-actions {
      display: flex;
      gap: 10px;
      margin-top: 22px;
    }

    .confirm-actions .btn {
      flex: 1;
      justify-content: center;
    }

    /* ── TOAST ── */
    .toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 500;
      display: flex;
      flex-direction: column;
      gap: 10px;
      pointer-events: none;
    }

    .toast {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      font-size: 13.5px;
      min-width: 260px;
      max-width: 340px;
      pointer-events: all;
      animation: toast-in 0.28s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    .toast.out {
      animation: toast-out 0.22s ease forwards;
    }

    .toast-icon {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .toast-icon svg {
      width: 16px;
      height: 16px;
    }

    .toast-success .toast-icon {
      background: var(--accent-light);
      color: var(--accent);
    }

    .toast-error .toast-icon {
      background: var(--danger-light);
      color: var(--danger);
    }

    .toast-info .toast-icon {
      background: var(--info-light);
      color: var(--info);
    }

    .toast-text {
      flex: 1;
    }

    .toast-text strong {
      display: block;
      font-weight: 600;
      margin-bottom: 1px;
    }

    .toast-text span {
      color: var(--text-2);
      font-size: 12px;
    }

    @keyframes toast-in {
      from {
        opacity: 0;
        transform: translateX(16px) scale(0.96);
      }

      to {
        opacity: 1;
        transform: translateX(0) scale(1);
      }
    }

    @keyframes toast-out {
      to {
        opacity: 0;
        transform: translateX(16px) scale(0.96);
      }
    }

    /* ── EMPTY STATE ── */
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-3);
    }

    .empty svg {
      width: 48px;
      height: 48px;
      margin: 0 auto 14px;
      opacity: 0.4;
    }

    .empty p {
      font-size: 14px;
    }

    /* ── SEARCH BAR ── */
    .search-bar {
      position: relative;
      margin-bottom: 18px;
    }

    .search-bar svg {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      width: 16px;
      height: 16px;
      color: var(--text-3);
      pointer-events: none;
    }

    .search-bar input {
      width: 100%;
      padding: 9px 12px 9px 38px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: 'DM Sans', sans-serif;
      font-size: 13.5px;
      color: var(--text);
      background: var(--surface);
      outline: none;
      transition: border-color var(--transition);
    }

    .search-bar input:focus {
      border-color: var(--accent);
    }

    /* ── LOADING ── */
    .loading-row {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .skeleton {
      background: linear-gradient(90deg, var(--surface-2) 25%, var(--border) 50%, var(--surface-2) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: var(--radius);
      height: 88px;
    }

    @keyframes shimmer {
      to {
        background-position: -200% 0;
      }
    }

    /* ── MISC ── */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 0 -26px 20px;
    }

    .tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .tag-cat {
      background: var(--surface-2);
      color: var(--text-2);
      border: 1px solid var(--border);
    }
  </style>
</head>

<body>

  <!-- TOPBAR -->
  <nav class="topbar">
    <div class="topbar-brand">
      <div class="topbar-logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round">
          <path d="M12 2L2 7l10 5 10-5-10-5z" />
          <path d="M2 17l10 5 10-5" />
          <path d="M2 12l10 5 10-5" />
        </svg>
      </div>
      <span class="topbar-title">Parapharmacie <span>Origine</span></span>
    </div>
    <div class="topbar-actions">
      <button class="btn btn-ghost btn-sm" id="syncBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round">
          <polyline points="1 4 1 10 7 10" />
          <polyline points="23 20 23 14 17 14" />
          <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15" />
        </svg>
        Synchroniser
      </button>
      <button class="btn btn-ghost btn-sm" id="logoutBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
          <polyline points="16 17 21 12 16 7" />
          <line x1="21" y1="12" x2="9" y2="12" />
        </svg>
        Déconnexion
      </button>
    </div>
  </nav>

  <!-- LAYOUT -->
  <div class="layout">
    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-label">Navigation</div>
      <a class="nav-link active" data-section="products">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round">
          <rect x="2" y="3" width="20" height="14" rx="2" />
          <line x1="8" y1="21" x2="16" y2="21" />
          <line x1="12" y1="17" x2="12" y2="21" />
        </svg>
        Produits
        <span class="nav-badge" id="products-count">0</span>
      </a>
      <a class="nav-link" data-section="orders">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round">
          <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z" />
          <line x1="3" y1="6" x2="21" y2="6" />
          <path d="M16 10a4 4 0 0 1-8 0" />
        </svg>
        Commandes
        <span class="nav-badge" id="orders-count">0</span>
      </a>
    </aside>

    <!-- MAIN -->
    <main class="main">

      <!-- PRODUCTS SECTION -->
      <div id="products-section" class="section active">
        <div class="page-header">
          <div>
            <h2>Produits</h2>
            <p id="products-subtitle">Chargement...</p>
          </div>
          <button class="btn btn-primary" id="addProductBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round">
              <line x1="12" y1="5" x2="12" y2="19" />
              <line x1="5" y1="12" x2="19" y2="12" />
            </svg>
            Ajouter un produit
          </button>
        </div>
        <div class="search-bar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          <input type="text" id="product-search" placeholder="Rechercher un produit...">
        </div>
        <div id="products-list">
          <div class="loading-row">
            <div class="skeleton"></div>
            <div class="skeleton"></div>
            <div class="skeleton"></div>
          </div>
        </div>
      </div>

      <!-- ORDERS SECTION -->
      <div id="orders-section" class="section">
        <div class="page-header">
          <div>
            <h2>Commandes</h2>
            <p id="orders-subtitle">Chargement...</p>
          </div>
        </div>
        <div class="search-bar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          <input type="text" id="order-search" placeholder="Rechercher une commande...">
        </div>
        <div id="orders-list">
          <div class="loading-row">
            <div class="skeleton"></div>
            <div class="skeleton"></div>
          </div>
        </div>
      </div>

    </main>
  </div>

  <!-- ORDER DETAIL DRAWER -->
  <div class="drawer-overlay" id="drawerOverlay"></div>
  <div class="drawer" id="orderDrawer">
    <div class="drawer-header">
      <span class="drawer-title" id="drawerTitle">Commande</span>
      <button class="drawer-close" id="drawerClose">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round" width="16" height="16">
          <line x1="18" y1="6" x2="6" y2="18" />
          <line x1="6" y1="6" x2="18" y2="18" />
        </svg>
      </button>
    </div>
    <div id="drawerContent"></div>
  </div>

  <!-- PRODUCT MODAL -->
  <div class="modal-overlay" id="productModal">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title" id="modalTitle">Ajouter un produit</span>
        <button class="drawer-close" id="closeModal">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round" width="16" height="16">
            <line x1="18" y1="6" x2="6" y2="18" />
            <line x1="6" y1="6" x2="18" y2="18" />
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <form id="productForm">
          <input type="hidden" id="productId" name="id">
          <div class="form-grid">
            <div class="form-group full">
              <label>Titre du produit</label>
              <input type="text" id="title" name="title" required placeholder="Ex: Crème hydratante SPF 50">
            </div>
            <div class="form-group">
              <label>Catégorie</label>
              <select id="cat" name="cat" required>
                <option value="peau">Soins de la peau</option>
                <option value="hygiene">Hygiène</option>
                <option value="complements">Compléments</option>
                <option value="maternite">Maternité</option>
                <option value="bienetre">Bien-être</option>
                <option value="solaire">Solaire</option>
              </select>
            </div>
            <div class="form-group">
              <label>Badge (optionnel)</label>
              <input type="text" id="badge" name="badge" placeholder="Ex: Nouveau, Promo">
            </div>
            <div class="form-group">
              <label>Prix (€)</label>
              <input type="number" id="price" name="price" step="0.01" required placeholder="0.00">
            </div>
            <div class="form-group">
              <label>Ancien prix (€)</label>
              <input type="number" id="oldPrice" name="oldPrice" step="0.01" placeholder="0.00">
            </div>
            <div class="form-group">
              <label>Note (étoiles)</label>
              <input type="number" id="stars" name="stars" min="1" max="5" required placeholder="1–5">
            </div>
            <div class="form-group full">
              <label>Image produit</label>
              <input type="file" id="imageFile" name="imageFile" accept="image/*">
              <input type="text" id="image" name="image" placeholder="Ou coller un URL d'image" style="margin-top:8px">
              <span class="form-hint">Choisissez un fichier ou entrez un URL</span>
            </div>
            <div class="form-group full">
              <label>Description</label>
              <textarea id="desc" name="desc" rows="3" required placeholder="Description du produit..."></textarea>
            </div>
            <div class="form-group full">
              <label>Caractéristiques</label>
              <textarea id="features" name="features" rows="4"
                placeholder="Une caractéristique par ligne&#10;Ex: Hydratant 24h&#10;Sans paraben"></textarea>
            </div>
          </div>
          <div class="divider" style="margin-top:20px"></div>
          <div class="modal-footer">
            <button type="button" class="btn btn-ghost" id="cancelBtn">Annuler</button>
            <button type="submit" class="btn btn-primary">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round" width="15" height="15">
                <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z" />
                <polyline points="17 21 17 13 7 13 7 21" />
                <polyline points="7 3 7 8 15 8" />
              </svg>
              Sauvegarder
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- CONFIRM DIALOG -->
  <div class="confirm-overlay" id="confirmOverlay">
    <div class="confirm-box">
      <div class="confirm-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6" />
          <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6" />
          <path d="M10 11v6" />
          <path d="M14 11v6" />
          <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2" />
        </svg>
      </div>
      <p class="confirm-title">Supprimer le produit ?</p>
      <p class="confirm-text" id="confirmText">Cette action est irréversible. Le produit sera définitivement supprimé.
      </p>
      <div class="confirm-actions">
        <button class="btn btn-ghost" id="confirmCancel">Annuler</button>
        <button class="btn btn-danger" id="confirmOk">Supprimer</button>
      </div>
    </div>
  </div>

  <!-- TOAST CONTAINER -->
  <div class="toast-container" id="toastContainer"></div>

  <script>
    // ── STATE ──
    let products = [];
    let orders = [];
    let pendingDeleteId = null;

    // ── AUTH ──
    function checkAuth() {
      const token = localStorage.getItem('adminToken');
      if (!token) { window.location.href = 'index.html'; return false; }
      return true;
    }

    // ── TOAST ──
    function toast(type, title, msg, duration = 3500) {
      const icons = {
        success: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`,
        error: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`,
        info: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`
      };
      const el = document.createElement('div');
      el.className = `toast toast-${type}`;
      el.innerHTML = `<div class="toast-icon">${icons[type]}</div><div class="toast-text"><strong>${title}</strong><span>${msg}</span></div>`;
      document.getElementById('toastContainer').appendChild(el);
      setTimeout(() => {
        el.classList.add('out');
        setTimeout(() => el.remove(), 250);
      }, duration);
    }

    // ── NAVIGATION ──
    document.querySelectorAll('.nav-link').forEach(link => {
      link.addEventListener('click', () => {
        const section = link.getAttribute('data-section');
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        link.classList.add('active');
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(section + '-section').classList.add('active');
      });
    });

    // ── LOAD DATA ──
    async function loadData() {
      try {
        const [pr, or] = await Promise.all([
          fetch('../assets/data/products.json').then(r => r.json()),
          fetch('../assets/data/orders.json').then(r => r.json())
        ]);
        products = pr; orders = or;
      } catch {
        // Fallback to localStorage
        products = JSON.parse(localStorage.getItem('products') || '[]');
        orders = JSON.parse(localStorage.getItem('orders') || '[]');
      }
      renderProducts(); renderOrders(); updateCounts();
    }

    function updateCounts() {
      document.getElementById('products-count').textContent = products.length;
      document.getElementById('orders-count').textContent = orders.length;
      document.getElementById('products-subtitle').textContent = `${products.length} produit${products.length !== 1 ? 's' : ''} au catalogue`;
      document.getElementById('orders-subtitle').textContent = `${orders.length} commande${orders.length !== 1 ? 's' : ''} reçue${orders.length !== 1 ? 's' : ''}`;
    }

    // ── PRODUCTS ──
    function starsHtml(n) {
      return Array.from({ length: 5 }, (_, i) => i < n ? '★' : '☆').join('');
    }
    function catLabel(cat) {
      const map = { peau: 'Soins peau', hygiene: 'Hygiène', complements: 'Compléments', maternite: 'Maternité', bienetre: 'Bien-être', solaire: 'Solaire' };
      return map[cat] || cat;
    }

    function renderProducts(filter = '') {
      const container = document.getElementById('products-list');
      const filtered = products.filter(p =>
        !filter || p.title.toLowerCase().includes(filter.toLowerCase()) || (p.cat && catLabel(p.cat).toLowerCase().includes(filter.toLowerCase()))
      );
      if (!filtered.length) {
        container.innerHTML = `<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg><p>Aucun produit trouvé.</p></div>`;
        return;
      }
      container.innerHTML = '';
      filtered.forEach(p => {
        const el = document.createElement('div');
        el.className = 'product-card';
        el.innerHTML = `
      ${p.image ? `<img class="product-img" src="../${p.image}" alt="${p.title}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">` : ''}
      <div class="product-img-placeholder" ${p.image ? 'style="display:none"' : ''}>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      </div>
      <div class="product-info">
        <div class="product-title">${p.title}${p.badge ? `<span class="product-badge">${p.badge}</span>` : ''}</div>
        <div class="product-meta">
          <span class="tag tag-cat">${catLabel(p.cat)}</span>
          <span class="stars" style="margin-left:8px">${starsHtml(p.stars)}</span>
        </div>
      </div>
      <div style="text-align:right;flex-shrink:0">
        <span class="product-price">${p.price.toFixed(2)}€</span>
        ${p.oldPrice ? `<span class="product-old-price">${p.oldPrice.toFixed(2)}€</span>` : ''}
      </div>
      <div class="product-actions">
        <button class="btn btn-ghost btn-sm edit-btn" data-id="${p.id}">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          Modifier
        </button>
        <button class="btn btn-sm delete-btn" data-id="${p.id}" style="background:var(--danger-light);color:var(--danger);border:1px solid #f5c6c3">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
        </button>
      </div>
    `;
        container.appendChild(el);
      });

      container.querySelectorAll('.edit-btn').forEach(btn =>
        btn.addEventListener('click', () => editProduct(parseInt(btn.dataset.id))));
      container.querySelectorAll('.delete-btn').forEach(btn =>
        btn.addEventListener('click', () => confirmDelete(parseInt(btn.dataset.id))));
    }

    document.getElementById('product-search').addEventListener('input', e => renderProducts(e.target.value));

    // ── ORDERS ──
    function renderOrders(filter = '') {
      const container = document.getElementById('orders-list');
      const filtered = orders.filter(o =>
        !filter ||
        String(o.id).includes(filter) ||
        (o.customer?.fullname || '').toLowerCase().includes(filter.toLowerCase())
      );
      if (!filtered.length) {
        container.innerHTML = `<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/></svg><p>Aucune commande trouvée.</p></div>`;
        return;
      }
      container.innerHTML = '';
      filtered.forEach(order => {
        const status = order.status || 'pending';
        const el = document.createElement('div');
        el.className = 'order-card';
        el.innerHTML = `
      <div class="order-header">
        <div>
          <div class="order-id">Commande <span>#${order.id}</span></div>
          <div class="order-meta">Client : <strong>${order.customer?.fullname || 'Inconnu'}</strong></div>
          <div class="order-meta">${order.items.length} article${order.items.length !== 1 ? 's' : ''}</div>
        </div>
        <div class="order-actions">
          <button class="btn btn-ghost btn-sm view-order-btn" data-id="${order.id}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            Détails
          </button>
          <button class="btn btn-sm status-btn" data-id="${order.id}" data-status="${status === 'completed' ? 'pending' : 'completed'}"
            style="${status === 'completed' ? 'background:var(--warn-light);color:var(--warn);border:1px solid #f3d28c' : 'background:var(--accent-light);color:var(--accent);border:1px solid #a8d5bc'}">
            ${status === 'completed' ? 'Marquer en attente' : 'Marquer traitée'}
          </button>
        </div>
      </div>
      <div class="order-footer">
        <span class="status-pill status-${status}">${status === 'completed' ? 'Traitée' : 'En attente'}</span>
        <span class="order-date">${new Date(order.timestamp).toLocaleString('fr-FR')}</span>
        <span class="order-total">${order.total}€</span>
      </div>
    `;
        container.appendChild(el);
      });

      container.querySelectorAll('.view-order-btn').forEach(btn =>
        btn.addEventListener('click', () => openDrawer(btn.dataset.id)));
      container.querySelectorAll('.status-btn').forEach(btn =>
        btn.addEventListener('click', () => updateOrderStatus(btn.dataset.id, btn.dataset.status)));
    }

    document.getElementById('order-search').addEventListener('input', e => renderOrders(e.target.value));

    // ── ORDER DRAWER ──
    function openDrawer(orderId) {
      const order = orders.find(o => o.id == orderId);
      if (!order) return;
      document.getElementById('drawerTitle').textContent = `Commande #${order.id}`;
      const status = order.status || 'pending';
      document.getElementById('drawerContent').innerHTML = `
    <div class="drawer-section">
      <div class="drawer-section-title">Client</div>
      <div class="drawer-info-grid">
        <div class="drawer-field"><label>Nom</label><span>${order.customer?.fullname || '—'}</span></div>
        <div class="drawer-field"><label>Email</label><span>${order.customer?.email || '—'}</span></div>
        <div class="drawer-field"><label>Téléphone</label><span>${order.customer?.phone || '—'}</span></div>
        <div class="drawer-field full"><label>Adresse</label><span>${order.customer?.address || '—'}</span></div>
      </div>
    </div>
    <div class="drawer-section">
      <div class="drawer-section-title">Articles</div>
      ${order.items.map(item => `
        <div class="drawer-item">
          <div class="drawer-item-img" style="display:flex;align-items:center;justify-content:center;font-size:20px">🧴</div>
          <div class="drawer-item-name">${item.title}<br><span class="drawer-item-qty" style="font-size:12px;color:var(--text-2)">× ${item.qty}</span></div>
          <div class="drawer-item-price">${(item.price * item.qty).toFixed(2)}€</div>
        </div>
      `).join('')}
    </div>
    <div class="drawer-section">
      <div class="drawer-section-title">Récapitulatif</div>
      <div class="drawer-totals">
        <div class="drawer-total-row"><span>Sous-total</span><span>${order.subtotal || '—'}€</span></div>
        <div class="drawer-total-row"><span>Livraison</span><span>${order.shipping || '—'}€</span></div>
        <div class="drawer-total-row final"><span>Total</span><span>${order.total}€</span></div>
      </div>
    </div>
    <div class="drawer-section">
      <div class="drawer-section-title">Statut</div>
      <span class="status-pill status-${status}">${status === 'completed' ? 'Traitée' : 'En attente'}</span>
      <span style="margin-left:10px;font-size:12px;color:var(--text-3)">${new Date(order.timestamp).toLocaleString('fr-FR')}</span>
    </div>
  `;
      document.getElementById('drawerOverlay').classList.add('open');
      document.getElementById('orderDrawer').classList.add('open');
    }
    function closeDrawer() {
      document.getElementById('drawerOverlay').classList.remove('open');
      document.getElementById('orderDrawer').classList.remove('open');
    }
    document.getElementById('drawerClose').addEventListener('click', closeDrawer);
    document.getElementById('drawerOverlay').addEventListener('click', closeDrawer);

    // ── PRODUCT MODAL ──
    function openProductModal(product = null) {
      document.getElementById('productForm').reset();
      if (product) {
        document.getElementById('modalTitle').textContent = 'Modifier le produit';
        document.getElementById('productId').value = product.id;
        document.getElementById('title').value = product.title;
        document.getElementById('cat').value = product.cat;
        document.getElementById('price').value = product.price;
        document.getElementById('oldPrice').value = product.oldPrice || '';
        document.getElementById('badge').value = product.badge || '';
        document.getElementById('stars').value = product.stars;
        document.getElementById('image').value = product.image || '';
        document.getElementById('desc').value = product.desc;
        document.getElementById('features').value = product.features ? product.features.join('\n') : '';
      } else {
        document.getElementById('modalTitle').textContent = 'Ajouter un produit';
        document.getElementById('productId').value = '';
      }
      document.getElementById('productModal').classList.add('open');
    }
    function closeProductModal() {
      document.getElementById('productModal').classList.remove('open');
    }
    document.getElementById('addProductBtn').addEventListener('click', () => openProductModal());
    document.getElementById('closeModal').addEventListener('click', closeProductModal);
    document.getElementById('cancelBtn').addEventListener('click', closeProductModal);
    document.getElementById('productModal').addEventListener('click', e => { if (e.target === document.getElementById('productModal')) closeProductModal(); });

    // ── SAVE PRODUCT ──
    document.getElementById('productForm').addEventListener('submit', async function (e) {
      e.preventDefault();
      const fd = new FormData(this);
      let imagePath = fd.get('image');
      const file = fd.get('imageFile');
      if (file && file.name) {
        const token = "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";
        try {
          imagePath = await uploadImageToGitHub(file, token);
        } catch (error) {
          toast('error', 'Erreur upload', 'Impossible d\'uploader l\'image: ' + error.message);
          return;
        }
      }
      const productData = {
        id: fd.get('id') ? parseInt(fd.get('id')) : Date.now(),
        title: fd.get('title'),
        cat: fd.get('cat'),
        price: parseFloat(fd.get('price')),
        oldPrice: fd.get('oldPrice') ? parseFloat(fd.get('oldPrice')) : null,
        badge: fd.get('badge') || null,
        stars: parseInt(fd.get('stars')),
        reviews: 0,
        image: imagePath,
        desc: fd.get('desc'),
        features: fd.get('features').split('\n').filter(f => f.trim())
      };
      const existing = products.findIndex(p => p.id === productData.id);
      if (existing > -1) { products[existing] = productData; toast('success', 'Produit modifié', `"${productData.title}" a été mis à jour.`); }
      else { products.push(productData); toast('success', 'Produit ajouté', `"${productData.title}" a été ajouté au catalogue.`); }
      saveProductsLocal();
      renderProducts();
      updateCounts();
      closeProductModal();
    });

    function editProduct(id) {
      const p = products.find(p => p.id === id);
      if (p) openProductModal(p);
    }

    // ── CONFIRM DELETE ──
    function confirmDelete(id) {
      pendingDeleteId = id;
      const p = products.find(p => p.id === id);
      document.getElementById('confirmText').textContent = `Supprimer "${p?.title || 'ce produit'}" ? Cette action est irréversible.`;
      document.getElementById('confirmOverlay').classList.add('open');
    }
    document.getElementById('confirmCancel').addEventListener('click', () => {
      pendingDeleteId = null;
      document.getElementById('confirmOverlay').classList.remove('open');
    });
    document.getElementById('confirmOk').addEventListener('click', () => {
      if (pendingDeleteId !== null) {
        const p = products.find(p => p.id === pendingDeleteId);
        products = products.filter(p => p.id !== pendingDeleteId);
        saveProductsLocal();
        renderProducts();
        updateCounts();
        toast('error', 'Produit supprimé', `"${p?.title || 'Produit'}" a été supprimé.`);
        pendingDeleteId = null;
        document.getElementById('confirmOverlay').classList.remove('open');
      }
    });

    // ── ORDER STATUS ──
    async function updateOrderStatus(orderId, status) {
      const order = orders.find(o => o.id == orderId);
      if (order) {
        order.status = status;
        saveOrdersLocal();
        renderOrders(document.getElementById('order-search').value);
        toast('success', 'Statut mis à jour', `Commande #${orderId} : ${status === 'completed' ? 'Traitée' : 'En attente'}.`);
      }
    }

    // ── PERSIST ──
    function saveProductsLocal() { localStorage.setItem('products', JSON.stringify(products, null, 2)); }
    function saveOrdersLocal() { localStorage.setItem('orders', JSON.stringify(orders, null, 2)); }

    // ── GITHUB SYNC ──
    async function syncToGitHub() {
      const token = "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";
      const repo = "location-vacances/paraorgine";
      toast('info', 'Synchronisation…', 'Envoi des données vers GitHub.');
      try {
        const [pSha, oSha] = await Promise.all([
          getFileSha(repo, 'assets/data/products.json', token),
          getFileSha(repo, 'assets/data/orders.json', token)
        ]);
        if (pSha) await updateFile(repo, 'assets/data/products.json', JSON.stringify(products, null, 2), pSha, token, 'Update products via admin panel');
        if (oSha) await updateFile(repo, 'assets/data/orders.json', JSON.stringify(orders, null, 2), oSha, token, 'Update orders via admin panel');
        toast('success', 'Synchronisé !', 'Les données ont été envoyées vers GitHub.');
      } catch (err) {
        toast('error', 'Erreur de synchronisation', err.message);
      }
    }
    async function getFileSha(repo, path, token) {
      const r = await fetch(`https://api.github.com/repos/${repo}/contents/${path}`, {
        headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' }
      });
      if (r.ok) { const d = await r.json(); return d.sha; }
      return null;
    }
    async function updateFile(repo, path, content, sha, token, message) {
      const r = await fetch(`https://api.github.com/repos/${repo}/contents/${path}`, {
        method: 'PUT',
        headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
        body: JSON.stringify({ message, content: btoa(unescape(encodeURIComponent(content))), sha, branch: 'main' })
      });
      if (!r.ok) throw new Error(`Échec de mise à jour : ${path}`);
    }
    async function uploadImageToGitHub(file, token) {
      const repo = 'location-vacances/Parapharmacie'; // Update with your actual repo: username/repo
      const fileName = `p${Date.now()}.${file.name.split('.').pop()}`;
      const path = `assets/imgs/products/${fileName}`;

      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = async function(e) {
          const base64 = e.target.result.split(',')[1]; // Remove data:image/jpeg;base64,

          try {
            const response = await fetch(`https://api.github.com/repos/${repo}/contents/${path}`, {
              method: 'PUT',
              headers: {
                'Authorization': `token ${token}`,
                'Accept': 'application/vnd.github.v3+json',
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({
                message: `Upload product image ${fileName}`,
                content: base64,
                branch: 'main'
              })
            });

            if (response.ok) {
              resolve(path);
            } else {
              const error = await response.json();
              reject(new Error(error.message || 'Upload failed'));
            }
          } catch (error) {
            reject(error);
          }
        };
        reader.onerror = () => reject(new Error('Failed to read file'));
        reader.readAsDataURL(file);
      });
    }

    // ── EVENTS ──
    document.getElementById('logoutBtn').addEventListener('click', () => {
      localStorage.removeItem('adminToken');
      window.location.href = 'index.html';
    });
    document.getElementById('syncBtn').addEventListener('click', syncToGitHub);

    // ── INIT ──
    if (checkAuth()) loadData();
  </script>
</body>
